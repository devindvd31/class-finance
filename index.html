<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班費管理系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card.balance {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .card.income {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .card.expense {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }
        
        .card-title {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .card-value {
            font-size: 2.5em;
            font-weight: bold;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .form-card {
            background: white;
            border-radius: 20px            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .form-card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            color: #555;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-income {
            background: #11998e;
            color: white;
            width: 100%;
        }
        
        .btn-income:hover {
            background: #0d7a6f;
        }
        
        .btn-expense {
            background: #f5576c;
            color: white;
            width: 100%;
        }
        
        .btn-expense:hover {
            background: #d63031;
        }
        
        .btn-export {
            background: #667eea;
            color: white;
            margin-top: 10px;
        }
        
        .table-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .table-card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn.active, .filter-btn:hover {
            background: #667eea;
            color: white;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f8f9fa;
            color: #555;
            font-weight: 600;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .type-income {
            color: #11998e;
            font-weight: bold;
        }
        
        .type-expense {
            color: #f5576c;
            font-weight: bold;
        }
        
        .amount-income {
            color: #11998e;
        }
        
        .amount-expense {
            color: #f5576c;
        }
        
        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
        }
        
        .monthly-report {
            margin-top: 30px;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .monthly-report h2 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .report-month {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .report-month-name {
            font-weight: bold;
            color: #333;
        }
        
        .report-month-amount {
            font-size: 1.2em;
            font-weight: bold;
        }
        
        .positive {
            color: #11998e;
        }
        
        .negative {
            color: #f5576c;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .month-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        
        .month-selector select {
            padding: 8px 15px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 班費管理系統</h1>
        
        <div class="dashboard">
            <div class="card balance">
                <div class="card-title">💰 餘額</div>
                <div class="card-value" id="balance">NT$0</div>
            </div>
            <div class="card income">
                <div class="card-title">📥 總收入</div>
                <div class="card-value" id="totalIncome">NT$0</div>
            </div>
            <div class="card expense">
                <div class="card-title">📤 總支出</div>
                <div class="card-value" id="totalExpense">NT$0</div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="form-card">
                <h2>📝 新增交易</h2>
                <form id="transactionForm">
                    <div class="form-group">
                        <label>類型</label>
                        <select id="type" required>
                            <option value="income">收入</option>
                            <option value="expense">支出</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>項目名稱</label>
                        <input type="text" id="description" placeholder="例如：班費繳納、購買教材" required>
                    </div>
                    <div class="form-group">
                        <label>金額 (NT$)</label>
                        <input type="number" id="amount" placeholder="0" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>備註 (選填)</label>
                        <textarea id="note" rows="2" placeholder="額外說明..."></textarea>
                    </div>
                    <button type="submit" class="btn" id="submitBtn">新增記錄</button>
                </form>
            </div>
            
            <div class="table-card">
                <h2>📊 交易記錄</h2>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="income">只看收入</button>
                    <button class="filter-btn" data-filter="expense">只看支出</button>
                </div>
                <div class="month-selector">
                    <label>選擇月份：</label>
                    <select id="monthFilter">
                        <option value="all">全部月份</option>
                    </select>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>項目</th>
                            <th>類型</th>
                            <th>金額</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTable">
                    </tbody>
                </table>
                <div class="empty-state" id="emptyState" style="display: none;">
                    📭 還沒有任何交易記錄
                </div>
            </div>
        </div>
        
        <div class="monthly-report">
            <h2>📅 每月收支報告</h2>
            <div id="monthlyReport"></div>
            <button class="btn btn-export" onclick="exportReport()">📤 匯出每月報告</button>
                <button class="btn btn-export" onclick="document.getElementById('importFile').click()" style="background:#38ef7d;margin-left:10px">📥 匯入資料</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
        </div>
    </div>

    <script>
        // 初始化
        let transactions = JSON.parse(localStorage.getItem('classFinance')) || [];
        
        // 預設資料（如果沒有本地資料）
        const defaultData = [{"type":"income","description":"班費收入","amount":127500,"date":"2025-05-23","note":"17人繳費"},{"type":"income","description":"班費收入","amount":127500,"date":"2025-05-24","note":"17人繳費"},{"type":"income","description":"班費收入","amount":30000,"date":"2025-05-25","note":"4人繳費"},{"type":"income","description":"班費收入","amount":7500,"date":"2025-05-30","note":"1人繳費"},{"type":"income","description":"班費收入","amount":7500,"date":"2025-05-31","note":"1人繳費"},{"type":"income","description":"班費收入","amount":7500,"date":"2025-06-03","note":"1人繳費"},{"type":"expense","description":"班服訂金","amount":6000,"date":"2025-06-13","note":"polo 253*43=10,879\nT       209*44 =9,196\n班旗(長)400元+班旗(短)240元\nTotal：20,715"},{"type":"expense","description":"手續費","amount":15,"date":"2025-06-13","note":"跨行手續費"},{"type":"expense","description":"班服尾款","amount":15115,"date":"2025-06-30","note":"Polo衫：253*43=10,879元\nT-shirt：209*44=9,196元\n班旗（長）：400元\n班旗（短）：240元\n運費：400\nTotal：21,115元\n扣掉訂金6,000元，尾款15,115元。"},{"type":"expense","description":"手續費","amount":15,"date":"2025-06-30","note":"跨行手續費"},{"type":"expense","description":"班費退費","amount":7038,"date":"2025-08-20","note":"楊O霖申請休學退班費\n7500(班費)-253(polo衫)-209(Tshirt)=7,038"},{"type":"expense","description":"班費退費","amount":7038,"date":"2025-08-20","note":"張O帆申請休學退班費\n7500(班費)-253(polo衫)-209(Tshirt)=7,038"},{"type":"expense","description":"班費退費","amount":7038,"date":"2025-09-15","note":"王O文申請休學退班費\n7500(班費)-253(polo衫)-209(Tshirt)=7,038"},{"type":"expense","description":"班費退費","amount":7038,"date":"2025-09-16","note":"鄭O申請休學退班費\n7500(班費)-253(polo衫)-209(Tshirt)=7,038"},{"type":"expense","description":"班費退費","amount":7038,"date":"2025-09-19","note":"趙O云申請休學退班費\n7500(班費)-253(polo衫)-209(Tshirt)=7,038"},{"type":"expense","description":"教師節活動","amount":50000,"date":"2025-09-24","note":"114e 35人+小e聯誼會5人(代墊款=8878)=40人\n40人*餐會 1,775.6=71,024元"},{"type":"expense","description":"手續費","amount":15,"date":"2025-09-24","note":""},{"type":"expense","description":"教師節活動","amount":21024,"date":"2025-09-24","note":""},{"type":"expense","description":"手續費","amount":15,"date":"2025-09-24","note":""},{"type":"income","description":"小e聯誼會5人代墊款","amount":8880,"date":"2025-10-07","note":"小e聯誼會5人(代墊款歸回)"},{"type":"expense","description":"聖誕餐費","amount":84000,"date":"2025-11-02","note":"28人x3000元"},{"type":"expense","description":"手續費","amount":30,"date":"2025-11-02","note":""},{"type":"expense","description":"聖誕制服","amount":24480,"date":"2025-11-05","note":"36人x680元"},{"type":"expense","description":"手續費","amount":15,"date":"2025-11-05","note":""},{"type":"expense","description":"導生聚差額","amount":1052,"date":"2025-11-25","note":"導生聚會共花費5252元，扣掉申請活動經費4,200元，班費需支出1052元。"},{"type":"expense","description":"手續費","amount":15,"date":"2025-11-25","note":""},{"type":"expense","description":"導生聚用品","amount":45,"date":"2025-11-25","note":"導生塑膠袋"},{"type":"expense","description":"聖誕制服重買","amount":4500,"date":"2025-12-09","note":"9人x500元"},{"type":"expense","description":"手續費","amount":15,"date":"2025-12-09","note":""},{"type":"expense","description":"利息","amount":748,"date":"2025-12-21","note":""},{"type":"expense","description":"尾牙班聚訂金","amount":18500,"date":"2025-12-25","note":""},{"type":"expense","description":"手續費","amount":15,"date":"2025-12-25","note":""},{"type":"expense","description":"聖誕晚會差額補","amount":8008,"date":"2025-12-29","note":""},{"type":"expense","description":"手續費","amount":15,"date":"2025-12-29","note":""},{"type":"expense","description":"尾牙班聚","amount":44508,"date":"2026-01-23","note":""},{"type":"expense","description":"手續費","amount":15,"date":"2026-01-23","note":""}];
        
        // 如果沒有本地資料，就用預設資料
        if (!localStorage.getItem('classFinance')) {
            transactions = defaultData;
            saveData();
        }
        let currentFilter = 'all';
        let currentMonth = 'all';
        
        // 設定今天日期
        document.getElementById('date').valueAsDate = new Date();
        
        // 初始化月份篩選
        function initMonthFilter() {
            const months = [...new Set(transactions.map(t => t.date.substring(0, 7))].sort().reverse();
            const select = document.getElementById('monthFilter');
            select.innerHTML = '<option value="all">全部月份</option>';
            months.forEach(month => {
                const [year, mon] = month.split('-');
                const option = document.createElement('option');
                option.value = month;
                option.textContent = `${year}年${mon}月`;
                select.appendChild(option);
            });
        }
        
        // 儲存資料
        function saveData() {
            localStorage.setItem('classFinance', JSON.stringify(transactions));
        }
        
        // 格式化金額
        function formatMoney(amount) {
            return 'NT$' + parseInt(amount).toLocaleString();
        }
        
        // 更新儀表板
        function updateDashboard() {
            const totalIncome = transactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + parseInt(t.amount), 0);
            const totalExpense = transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + parseInt(t.amount), 0);
            const balance = totalIncome - totalExpense;
            
            document.getElementById('balance').textContent = formatMoney(balance);
            document.getElementById('totalIncome').textContent = formatMoney(totalIncome);
            document.getElementById('totalExpense').textContent = formatMoney(totalExpense);
            
            document.getElementById('balance').className = 'card-value ' + (balance >= 0 ? 'positive' : 'negative');
        }
        
        // 渲染表格
        function renderTable() {
            let filtered = transactions;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(t => t.type === currentFilter);
            }
            
            if (currentMonth !== 'all') {
                filtered = filtered.filter(t => t.date.startsWith(currentMonth));
            }
            
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            const tbody = document.getElementById('transactionTable');
            const emptyState = document.getElementById('emptyState');
            
            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            tbody.innerHTML = filtered.map((t, index) => `
                <tr>
                    <td>${t.date}</td>
                    <td>${t.description}${t.note ? '<br><small style="color:#999">'+t.note+'</small>' : ''}</td>
                    <td class="type-${t.type}">${t.type === 'income' ? '📥 收入' : '📤 支出'}</td>
                    <td class="amount-${t.type}">${t.type === 'income' ? '+' : '-'}${formatMoney(t.amount)}</td>
                    <td><button class="delete-btn" onclick="deleteTransaction(${transactions.indexOf(t)})">🗑️</button></td>
                </tr>
            `).join('');
        }
        
        // 渲染每月報告
        function renderMonthlyReport() {
            const monthlyData = {};
            
            transactions.forEach(t => {
                const month = t.date.substring(0, 7);
                if (!monthlyData[month]) {
                    monthlyData[month] = { income: 0, expense: 0 };
                }
                monthlyData[month][t.type] += parseInt(t.amount);
            });
            
            const sortedMonths = Object.keys(monthlyData).sort().reverse();
            const container = document.getElementById('monthlyReport');
            
            if (sortedMonths.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 還沒有資料</div>';
                return;
            }
            
            container.innerHTML = sortedMonths.map(month => {
                const data = monthlyData[month];
                const balance = data.income - data.expense;
                const [year, mon] = month.split('-');
                return `
                    <div class="report-month">
                        <div class="report-month-name">${year}年${mon}月</div>
                        <div>
                            <span style="color:#11998e">收入: ${formatMoney(data.income)}</span>
                            <span style="margin:0 10px">|</span>
                            <span style="color:#f5576c">支出: ${formatMoney(data.expense)}</span>
                            <span style="margin:0 10px">|</span>
                            <span class="${balance >= 0 ? 'positive' : 'negative'}">餘額: ${formatMoney(balance)}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 新增交易
        document.getElementById('transactionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const transaction = {
                type: document.getElementById('type').value,
                description: document.getElementById('description').value,
                amount: parseInt(document.getElementById('amount').value),
                date: document.getElementById('date').value,
                note: document.getElementById('note').value
            };
            
            transactions.push(transaction);
            saveData();
            
            // 重置表單
            document.getElementById('description').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
            
            updateDashboard();
            renderTable();
            initMonthFilter();
            renderMonthlyReport();
        });
        
        // 刪除交易
        function deleteTransaction(index) {
            if (confirm('確定要刪除這筆記錄嗎？')) {
                transactions.splice(index, 1);
                saveData();
                updateDashboard();
                renderTable();
                initMonthFilter();
                renderMonthlyReport();
            }
        }
        
        // 篩選按鈕
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderTable();
            });
        });
        
        // 月份篩選
        document.getElementById('monthFilter').addEventListener('change', function() {
            currentMonth = this.value;
            renderTable();
        });
        
        // 匯出報告
        function exportReport() {
            let report = '=== 班費收支報告 ===\n\n';
            
            const monthlyData = {};
            transactions.forEach(t => {
                const month = t.date.substring(0, 7);
                if (!monthlyData[month]) {
                    monthlyData[month] = { income: 0, expense: 0, items: [] };
                }
                monthlyData[month].income += t.type === 'income' ? parseInt(t.amount) : 0;
                monthlyData[month].expense += t.type === 'expense' ? parseInt(t.amount) : 0;
                monthlyData[month].items.push(t);
            });
            
            Object.keys(monthlyData).sort().reverse().forEach(month => {
                const data = monthlyData[month];
                const [year, mon] = month.split('-');
                report += `\n【${year}年${mon}月】\n`;
                report += `收入: ${data.income} | 支出: ${data.expense} | 餘額: ${data.income - data.expense}\n`;
                report += '----------------\n';
                
                data.items.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(t => {
                    const typeStr = t.type === 'income' ? '[收入]' : '[支出]';
                    report += `${t.date} ${typeStr} ${t.description} ${t.amount}\n`;
                });
                report += '\n';
            });
            
            // 下載檔案
            const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `班費報告_${new Date().toISOString().split('T')[0]}.txt`;
            link.click();
        }
        
        // 匯入資料
        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        if (confirm('匯入將會覆蓋目前所有資料，確定要匯入嗎？')) {
                            transactions = imported;
                            saveData();
                            updateDashboard();
                            renderTable();
                            initMonthFilter();
                            renderMonthlyReport();
                            alert('匯入成功！共匯入 ' + imported.length + ' 筆資料');
                        }
                    } else {
                        alert('資料格式錯誤');
                    }
                } catch (err) {
                    alert('匯入失敗：' + err.message);
                }
            };
            reader.readAsText(file);
        }
        
        // 初始化
        updateDashboard();
        renderTable();
        initMonthFilter();
        renderMonthlyReport();
    </script>
</body>
</html>
