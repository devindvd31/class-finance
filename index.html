<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班費管理系統</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 30px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card.balance { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .card.income { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .card.expense { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: white; }
        .card-title { font-size: 0.9em; opacity: 0.9; margin-bottom: 10px; }
        .card-value { font-size: 2.5em; font-weight: bold; }
        .main-content { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
        .form-card, .table-card, .report-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-card h2, .table-card h2, .report-card h2 { color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #667eea; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #555; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1em; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; font-size: 0.9em; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-primary { background: #667eea; color: white; width: 100%; padding: 12px 30px; }
        .btn-edit { background: #ffa500; color: white; }
        .btn-delete { background: #ff6b6b; color: white; }
        .btn-report { background: #11998e; color: white; margin-bottom: 10px; }
        .btn-pdf { background: #e74c3c; color: white; margin-bottom: 10px; }
        .btn-image { background: #3498db; color: white; margin-bottom: 10px; }
        .btn-cancel { background: #999; color: white; }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 20px; cursor: pointer; }
        .filter-btn.active { background: #667eea; color: white; }
        table { width: 100%; border-collapse: collapse; table-layout: auto; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #555; font-weight: 600; cursor: pointer; user-select: none; }
        th:hover { background: #e9ecef; }
        th.sorted-asc::after { content: ' ▲'; }
        th.sorted-desc::after { content: ' ▼'; }
        .col-date { width: 110px; white-space: nowrap; }
        .col-desc { width: 150px; }
        .col-type { width: 60px; white-space: nowrap; }
        .col-amount { width: 100px; text-align: right; white-space: nowrap; }
        .col-balance { width: 100px; text-align: right; white-space: nowrap; }
        .col-action { width: 100px; }
        .col-note { text-align: left; }
        .type-income { color: #11998e; font-weight: bold; }
        .type-expense { color: #f5576c; font-weight: bold; }
        .positive { color: #11998e; }
        .negative { color: #f5576c; }
        
        .report-month { margin-bottom: 10px; }
        .report-month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .report-month-title { font-size: 1.1em; font-weight: bold; color: #333; }
        .report-month-balance { font-size: 1em; font-weight: bold; }
        .report-month-details { display: flex; gap: 15px; font-size: 0.9em; }
        .report-income { color: #11998e; }
        .report-expense { color: #f5576c; }
        .report-item { padding: 4px 8px; display: flex; justify-content: space-between; font-size: 0.9em; }
        .report-item:nth-child(even) { background: #f9f9f9; }
        .report-item-desc { flex: 1; text-align: left; }
        .report-item-amount { font-weight: bold; }
        
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 20px; cursor: pointer; }
        .tab-btn.active { background: #667eea; color: white; }
        
        .hidden { display: none; }
        
        /* 匯出按鈕區域 */
        .export-buttons { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 班費管理系統</h1>
        <div class="dashboard">
            <div class="card balance">
                <div class="card-title">💰 餘額</div>
                <div class="card-value" id="balance">NT$0</div>
            </div>
            <div class="card income">
                <div class="card-title">📥 總收入</div>
                <div class="card-value" id="totalIncome">NT$0</div>
            </div>
            <div class="card expense">
                <div class="card-title">📤 總支出</div>
                <div class="card-value" id="totalExpense">NT$0</div>
            </div>
        </div>
        
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showTab('transactions')">📊 交易記錄</button>
            <button class="tab-btn" onclick="showTab('report')">📋 每月報表</button>
        </div>
        
        <!-- 交易記錄區塊 -->
        <div id="transactionsTab">
            <div class="main-content">
                <div class="form-card">
                    <h2>📝 新增交易</h2>
                    <form id="transactionForm">
                        <div class="form-group">
                            <label>類型</label>
                            <select id="type">
                                <option value="income">收入</option>
                                <option value="expense">支出</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>項目名稱</label>
                            <input type="text" id="description" required>
                        </div>
                        <div class="form-group">
                            <label>金額 (NT$)</label>
                            <input type="number" id="amount" min="0" required>
                        </div>
                        <div class="form-group">
                            <label>日期</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label>備註</label>
                            <textarea id="note" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" id="submitBtn">新增記錄</button>
                        <button type="button" class="btn btn-cancel" id="cancelBtn" style="display:none; width:100%; margin-top:10px;">取消編輯</button>
                    </form>
                </div>
                <div class="table-card">
                    <h2>📊 交易記錄</h2>
                    <div class="filters">
                        <button class="filter-btn active" onclick="setFilter('all')">全部</button>
                        <button class="filter-btn" onclick="setFilter('income')">收入</button>
                        <button class="filter-btn" onclick="setFilter('expense')">支出</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th class="col-date" onclick="sortTable('date')">日期</th>
                                <th class="col-desc" onclick="sortTable('description')">項目</th>
                                <th class="col-type" onclick="sortTable('type')">類型</th>
                                <th class="col-amount" onclick="sortTable('amount')">金額</th>
                                <th class="col-balance" onclick="sortTable('balance')">餘額</th>
                                <th class="col-note">備註</th>
                                <th class="col-action">操作</th>
                            </tr>
                        </thead>
                        <tbody id="transactionTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 每月報表區塊 -->
        <div id="reportTab" class="hidden">
            <div class="report-card" id="reportContent">
                <h2>📋 每月收支報表</h2>
                <div class="export-buttons">
                    <button class="btn btn-pdf" onclick="exportPDF()">📄 匯出 PDF</button>
                    <button class="btn btn-image" onclick="exportImage()">🖼️ 匯出圖片</button>
                </div>
                <div id="monthlyReport"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 班費資料
        var transactions = [
            {type: "income", description: "班費收入", amount: 127500, date: "2025-05-23", note: "17人繳費"},
            {type: "income", description: "班費收入", amount: 127500, date: "2025-05-24", note: "17人繳費"},
            {type: "income", description: "班費收入", amount: 30000, date: "2025-05-25", note: "4人繳費"},
            {type: "income", description: "班費收入", amount: 7500, date: "2025-05-30", note: "1人繳費"},
            {type: "income", description: "班費收入", amount: 7500, date: "2025-05-31", note: "1人繳費"},
            {type: "income", description: "班費收入", amount: 7500, date: "2025-06-03", note: "1人繳費"},
            {type: "expense", description: "班服訂金", amount: 6000, date: "2025-06-13", note: "polo 253*43=10,879"},
            {type: "expense", description: "手續費", amount: 15, date: "2025-06-13", note: "跨行手續費"},
            {type: "expense", description: "班服尾款", amount: 15115, date: "2025-06-30", note: "Polo衫+T-shirt+班旗"},
            {type: "expense", description: "手續費", amount: 15, date: "2025-06-30", note: "跨行手續費"},
            {type: "expense", description: "班費退費", amount: 7038, date: "2025-08-20", note: "楊O霖休學退費"},
            {type: "expense", description: "班費退費", amount: 7038, date: "2025-08-20", note: "張O帆休學退費"},
            {type: "expense", description: "班費退費", amount: 7038, date: "2025-09-15", note: "王O文休學退費"},
            {type: "expense", description: "班費退費", amount: 7038, date: "2025-09-16", note: "鄭O休學退費"},
            {type: "expense", description: "班費退費", amount: 7038, date: "2025-09-19", note: "趙O云休學退費"},
            {type: "expense", description: "教師節活動", amount: 50000, date: "2025-09-24", note: "114e 35人+小e 5人"},
            {type: "expense", description: "手續費", amount: 15, date: "2025-09-24", note: ""},
            {type: "expense", description: "教師節活動", amount: 21024, date: "2025-09-24", note: ""},
            {type: "expense", description: "手續費", amount: 15, date: "2025-09-24", note: ""},
            {type: "income", description: "小e聯誼會5人代墊款", amount: 8880, date: "2025-10-07", note: ""},
            {type: "expense", description: "聖誕餐費", amount: 84000, date: "2025-11-02", note: "28人x3000元"},
            {type: "expense", description: "手續費", amount: 30, date: "2025-11-02", note: ""},
            {type: "expense", description: "聖誕制服", amount: 24480, date: "2025-11-05", note: "36人x680元"},
            {type: "expense", description: "手續費", amount: 15, date: "2025-11-05", note: ""},
            {type: "expense", description: "導生聚差額", amount: 1052, date: "2025-11-25", note: ""},
            {type: "expense", description: "手續費", amount: 15, date: "2025-11-25", note: ""},
            {type: "expense", description: "導生聚用品", amount: 45, date: "2025-11-25", note: "導生塑膠袋"},
            {type: "expense", description: "聖誕制服重買", amount: 4500, date: "2025-12-09", note: "9人x500元"},
            {type: "expense", description: "手續費", amount: 15, date: "2025-12-09", note: ""},
            {type: "expense", description: "利息", amount: 748, date: "2025-12-21", note: ""},
            {type: "expense", description: "尾牙班聚訂金", amount: 18500, date: "2025-12-25", note: ""},
            {type: "expense", description: "手續費", amount: 15, date: "2025-12-25", note: ""},
            {type: "expense", description: "聖誕晚會差額補", amount: 8008, date: "2025-12-29", note: ""},
            {type: "expense", description: "手續費", amount: 15, date: "2025-12-29", note: ""},
            {type: "expense", description: "尾牙班聚", amount: 44508, date: "2026-01-23", note: ""},
            {type: "expense", description: "手續費", amount: 15, date: "2026-01-23", note: ""}
        ];
        
        var currentFilter = 'all';
        var editingIndex = -1;
        var sortColumn = 'date';
        var sortDirection = 'desc'; // 預設由新到舊
        
        function showTab(tab) {
            document.getElementById('transactionsTab').classList.add('hidden');
            document.getElementById('reportTab').classList.add('hidden');
            document.getElementById(tab + 'Tab').classList.remove('hidden');
            
            var buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(function(btn) { btn.classList.remove('active'); });
            event.target.classList.add('active');
            
            if (tab === 'report') {
                renderMonthlyReport();
            }
        }
        
        function calculateBalances() {
            var balances = [];
            var balance = 0;
            for (var i = 0; i < transactions.length; i++) {
                if (transactions[i].type === 'income') {
                    balance += parseInt(transactions[i].amount);
                } else {
                    balance -= parseInt(transactions[i].amount);
                }
                balances[i] = balance;
            }
            return balances;
        }
        
        document.getElementById('date').valueAsDate = new Date();
        
        function formatMoney(amount) {
            return 'NT$' + parseInt(amount).toLocaleString();
        }
        
        function updateDashboard() {
            var totalIncome = 0;
            var totalExpense = 0;
            for (var i = 0; i < transactions.length; i++) {
                if (transactions[i].type === 'income') {
                    totalIncome += parseInt(transactions[i].amount);
                } else {
                    totalExpense += parseInt(transactions[i].amount);
                }
            }
            var balance = totalIncome - totalExpense;
            document.getElementById('balance').textContent = formatMoney(balance);
            document.getElementById('totalIncome').textContent = formatMoney(totalIncome);
            document.getElementById('totalExpense').textContent = formatMoney(totalExpense);
        }
        
        function sortTable(column) {
            var headers = document.querySelectorAll('th');
            headers.forEach(function(h) { h.classList.remove('sorted-asc', 'sorted-desc'); });
            
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'desc'; // 預設由新到舊
            }
            
            var header = document.querySelector('th[onclick="sortTable(\'' + column + '\')"]');
            if (header) header.classList.add(sortDirection === 'asc' ? 'sorted-asc' : 'sorted-desc');
            
            // 複製陣列來排序，不改變原始順序（這樣餘額才會正確）
            var sortedTransactions = transactions.slice();
            sortedTransactions.sort(function(a, b) {
                var valA, valB;
                if (column === 'date') { valA = new Date(a.date); valB = new Date(b.date); }
                else if (column === 'amount') { valA = parseInt(a.amount); valB = parseInt(b.amount); }
                else if (column === 'type') { valA = a.type; valB = b.type; }
                else if (column === 'description') { valA = a.description; valB = b.description; }
                else if (column === 'balance') { valA = a.originalBalance; valB = b.originalBalance; }
                if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
                if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
            
            // 計算每筆資料的餘額（基於原始順序）
            var balances = [];
            var balance = 0;
            transactions.forEach(function(t) {
                if (t.type === 'income') balance += parseInt(t.amount);
                else balance -= parseInt(t.amount);
                t.originalBalance = balance;
            });
            
            // 用排序後的順序顯示，但餘額用原始順序計算的
            renderTable(sortedTransactions);
        }
        
        function renderTable(displayTransactions) {
            if (!displayTransactions) displayTransactions = transactions;
            var tbody = document.getElementById('transactionTable');
            var html = '';
            
            // 計算餘額（基於原始順序）
            var balances = [];
            var balance = 0;
            transactions.forEach(function(t, i) {
                if (t.type === 'income') balance += parseInt(t.amount);
                else balance -= parseInt(t.amount);
                balances[i] = balance;
            });
            
            // 建立 index 对照表
            var indexMap = {};
            transactions.forEach(function(t, i) { indexMap[t] = i; });
            
            for (var i = 0; i < displayTransactions.length; i++) {
                var t = displayTransactions[i];
                if (currentFilter !== 'all' && t.type !== currentFilter) continue;
                var originalIndex = indexMap[t];
                var typeLabel = t.type === 'income' ? '收入' : '支出';
                var amountPrefix = t.type === 'income' ? '+' : '-';
                var balance = balances[originalIndex];
                var balanceClass = balance >= 0 ? 'positive' : 'negative';
                html += '<tr>';
                html += '<td>' + t.date + '</td>';
                html += '<td>' + t.description + '</td>';
                html += '<td class="type-' + t.type + '">' + typeLabel + '</td>';
                html += '<td class="type-' + t.type + '">' + amountPrefix + formatMoney(t.amount) + '</td>';
                html += '<td class="' + balanceClass + '">' + formatMoney(balance) + '</td>';
                html += '<td style="text-align:left">' + t.note + '</td>';
                html += '<td>';
                html += '<button class="btn btn-edit" onclick="editTransaction(' + originalIndex + ')">編輯</button>';
                html += '<button class="btn btn-delete" onclick="deleteTransaction(' + originalIndex + ')">刪除</button>';
                html += '</td></tr>';
            }
            tbody.innerHTML = html;
        }
        
        function setFilter(filter) {
            currentFilter = filter;
            var buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(function(b) { b.classList.remove('active'); });
            event.target.classList.add('active');
            renderTable();
        }
        
        function editTransaction(index) {
            var t = transactions[index];
            document.getElementById('type').value = t.type;
            document.getElementById('description').value = t.description;
            document.getElementById('amount').value = t.amount;
            document.getElementById('date').value = t.date;
            document.getElementById('note').value = t.note;
            editingIndex = index;
            document.getElementById('submitBtn').textContent = '更新記錄';
            document.getElementById('cancelBtn').style.display = 'block';
        }
        
        function deleteTransaction(index) {
            if (confirm('確定要刪除這筆記錄嗎？')) {
                transactions.splice(index, 1);
                updateDashboard();
                renderTable();
            }
        }
        
        document.getElementById('cancelBtn').addEventListener('click', function() {
            editingIndex = -1;
            document.getElementById('transactionForm').reset();
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('submitBtn').textContent = '新增記錄';
            document.getElementById('cancelBtn').style.display = 'none';
        });
        
        document.getElementById('transactionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var transaction = {
                type: document.getElementById('type').value,
                description: document.getElementById('description').value,
                amount: parseInt(document.getElementById('amount').value),
                date: document.getElementById('date').value,
                note: document.getElementById('note').value
            };
            if (editingIndex >= 0) {
                transactions[editingIndex] = transaction;
                editingIndex = -1;
                document.getElementById('submitBtn').textContent = '新增記錄';
                document.getElementById('cancelBtn').style.display = 'none';
            } else {
                transactions.push(transaction);
            }
            document.getElementById('transactionForm').reset();
            document.getElementById('date').valueAsDate = new Date();
            updateDashboard();
            renderTable();
        });
        
        function renderMonthlyReport() {
            var monthlyData = {};
            var balance = 0;
            
            transactions.forEach(function(t) {
                var month = t.date.substring(0, 7);
                if (!monthlyData[month]) monthlyData[month] = { income: 0, expense: 0, items: [] };
                if (t.type === 'income') { monthlyData[month].income += parseInt(t.amount); balance += parseInt(t.amount); }
                else { monthlyData[month].expense += parseInt(t.amount); balance -= parseInt(t.amount); }
                monthlyData[month].items.push(t);
                monthlyData[month].endingBalance = balance;
            });
            
            var months = Object.keys(monthlyData).sort().reverse();
            var html = '';
            
            months.forEach(function(month) {
                var data = monthlyData[month];
                var [year, mon] = month.split('-');
                var balanceClass = data.endingBalance >= 0 ? 'positive' : 'negative';
                
                html += '<div class="report-month">';
                html += '<div class="report-month-header">';
                html += '<div class="report-month-title">' + year + '年 ' + mon + '月</div>';
                html += '<div class="report-month-balance ' + balanceClass + '">期末餘額：' + formatMoney(data.endingBalance) + '</div>';
                html += '</div>';
                html += '<div class="report-month-details">';
                html += '<div class="report-income">📥 收入：' + formatMoney(data.income) + '</div>';
                html += '<div class="report-expense">📤 支出：' + formatMoney(data.expense) + '</div>';
                html += '</div>';
                html += '<hr style="margin:15px 0;border:none;border-top:1px solid #ddd">';
                
                data.items.forEach(function(item) {
                    var amountPrefix = item.type === 'income' ? '+' : '-';
                    var amountClass = item.type === 'income' ? 'report-income' : 'report-expense';
                    html += '<div class="report-item">';
                    html += '<div class="report-item-desc">' + item.date + ' ' + item.description + (item.note ? ' <span style="color:#999">(' + item.note + ')</span>' : '') + '</div>';
                    html += '<div class="report-item-amount ' + amountClass + '">' + amountPrefix + formatMoney(item.amount) + '</div>';
                    html += '</div>';
                });
                html += '</div>';
            });
            
            document.getElementById('monthlyReport').innerHTML = html || '<p style="text-align:center;color:#999">尚無資料</p>';
        }
        
        // 匯出 PDF
        function exportPDF() {
            var element = document.getElementById('reportContent');
            html2canvas(element, { scale: 2, backgroundColor: '#ffffff' }).then(function(canvas) {
                var imgData = canvas.toDataURL('image/png');
                var { jsPDF } = window.jspdf;
                var pdf = new jsPDF('p', 'mm', 'a4');
                var imgWidth = 210;
                var pageHeight = 297;
                var imgHeight = canvas.height * imgWidth / canvas.width;
                var heightLeft = imgHeight;
                var position = 0;
                
                pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                heightLeft -= pageHeight;
                
                while (heightLeft >= 0) {
                    position = heightLeft - imgHeight;
                    pdf.addPage();
                    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;
                }
                
                pdf.save('班費報表_' + new Date().toISOString().split('T')[0] + '.pdf');
            });
        }
        
        // 匯出圖片
        function exportImage() {
            var element = document.getElementById('reportContent');
            html2canvas(element, { scale: 2, backgroundColor: '#ffffff' }).then(function(canvas) {
                var link = document.createElement('a');
                link.download = '班費報表_' + new Date().toISOString().split('T')[0] + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
        
        // 初始化 - 預設排序由新到舊
        updateDashboard();
        
        // 手動設定排序狀態（不觸發 toggle）
        sortColumn = 'date';
        sortDirection = 'desc';
        transactions.sort(function(a, b) {
            var valA = new Date(a.date);
            var valB = new Date(b.date);
            if (valA < valB) return 1; // 新的在前
            if (valA > valB) return -1;
            return 0;
        });
        renderTable();
        
        // 顯示排序圖示
        var headers = document.querySelectorAll('th');
        headers.forEach(function(h) { h.classList.remove('sorted-asc', 'sorted-desc'); });
        var dateHeader = document.querySelector('th[onclick="sortTable(\'date\')"]');
        if (dateHeader) dateHeader.classList.add('sorted-desc');
    </script>
</body>
</html>
